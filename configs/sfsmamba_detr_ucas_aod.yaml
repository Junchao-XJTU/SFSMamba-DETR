# SFSMamba-DETR config for UCAS-AOD dataset
# Dataset: https://github.com/Lbx2020/UCAS-AOD-dataset

train_img_dir: data/UCAS-AOD/images/train
train_ann_file: data/UCAS-AOD/annotations/instances_train.json
val_img_dir: data/UCAS-AOD/images/val
val_ann_file: data/UCAS-AOD/annotations/instances_val.json

num_classes: 2   # car, airplane
img_size: 640

d_model: 256
num_queries: 300
num_decoder_layers: 3
small_win: 7
large_win: 14
d_state: 16
num_heads: 8
dim_feedforward: 1024
dropout: 0.0
pretrained_backbone: true

epochs: 150
batch_size: 16
val_batch_size: 8
num_workers: 4
lr: 1.0e-4
weight_decay: 1.0e-4

lambda_cls: 2.0
lambda_l1: 5.0
lambda_giou: 2.0
lambda_iou: 1.0
